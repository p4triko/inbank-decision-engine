<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Engine</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&family=Teko:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <p class="candidateHeading">Choose one of the 4 scenarios:</p>
        <div class="personalCodes">
            <label>
                <input type="radio" name="scenario" value="49002010965" checked> 49002010965
            </label>
            <label>
                <input type="radio" name="scenario" value="49002010976"> 49002010976
            </label>
            <label>
                <input type="radio" name="scenario" value="49002010987"> 49002010987
            </label>
            <label>
                <input type="radio" name="scenario" value="49002010998"> 49002010998
            </label>
        </div>
        <div class="slidercontainer">
            <input type="range" min="2000" max="10000" value="100" class="slider" id="amountSlider">
            <div class="amountDisplay">2000</div>
            <input type="range" min="12" max="60" value="1" class="slider" id="periodSlider">
            <div class="periodDisplay">12</div>
        </div>
        <p>Eligibility</p>
        <div class="eligibilityReport">
        </div>
    </div>
    
    <script src="/frontend/script.js"></script>
</body>
</html>
